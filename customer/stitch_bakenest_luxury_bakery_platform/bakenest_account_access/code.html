<style>.glass-card {

    backdrop-filter: blur(25px);

<body class="bg-background text-on-background min-h-screen relative flex items-center justify-center p-4">
<!-- Blurred Background Visual -->
<div class="bg-image-blur" data-alt="A highly detailed macro shot of a delicate, multi-layered artisanal cake, softly blurred to create a textured, abstract background. The color palette features warm creams, soft whites, and hints of luxurious golden-brown crust. The lighting is bright and ethereal, perfectly aligning with a light-mode editorial luxury aesthetic. The mood is calm, indulgent, and sophisticated."></div>
<!-- Main Authentication Container -->
<main class="w-full max-w-md relative z-10">
<!-- Brand Header inside Canvas -->
<div class="text-center mb-12">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">BakeNest</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Artisanal Patisserie</p>
</div>
<!-- Glass Card -->
<div class="glass-card rounded-xl p-8 w-full transition-transform duration-500 ease-[cubic-bezier(0.2,0,0,1)] hover:scale-[1.01]">
<!-- Tabs -->
<div class="flex border-b border-outline-variant/30 mb-8">
<button class="flex-1 pb-4 font-label-lg text-label-lg uppercase tracking-widest text-primary border-b-2 border-primary transition-colors">
                    Sign In
                </button>
<button class="flex-1 pb-4 font-label-lg text-label-lg uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors">
                    Create Account
                </button>
</div>
<!-- Form Content (Sign In Active) -->
<form class="space-y-8">
<!-- Email Input -->
<div class="relative pt-6 input-line group">
<label class="absolute top-0 left-0 font-label-sm text-label-sm text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">
                        Email Address
                    </label>
<input class="w-full bg-transparent border-none p-0 pb-2 font-body-lg text-body-lg text-on-surface focus:ring-0 placeholder-transparent" placeholder="Email Address" type="email"/>
</div>
<!-- Password Input -->
<div class="relative pt-6 input-line group">
<label class="absolute top-0 left-0 font-label-sm text-label-sm text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">
                        Password
                    </label>
<input class="w-full bg-transparent border-none p-0 pb-2 font-body-lg text-body-lg text-on-surface focus:ring-0 placeholder-transparent" placeholder="Password" type="password"/>
<button class="absolute right-0 bottom-2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<div class="flex justify-between items-center pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="form-checkbox text-primary border-outline-variant rounded rounded-sm focus:ring-primary focus:ring-offset-background" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors underline-offset-4 hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-4 rounded-[32px] font-label-lg text-label-lg uppercase tracking-widest hover:bg-secondary transition-colors duration-300 ease-[cubic-bezier(0.2,0,0,1)] shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="px-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Sign-in -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3 rounded-lg border border-outline-variant/50 bg-white/10 hover:bg-white/20 transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
<span class="font-label-sm text-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center space-x-2 py-3 rounded-lg border border-outline-variant/50 bg-white/10 hover:bg-white/20 transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="apple">ios</span>
<span class="font-label-sm text-label-sm text-on-surface">Apple</span>
</button>
</div>
</div>
</main>
</body></html>
