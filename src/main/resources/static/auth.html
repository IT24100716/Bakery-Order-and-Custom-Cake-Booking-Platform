<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BakeNest - Authentication</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#584413",
                        "secondary-fixed": "#ffdf9f",
                        "on-error": "#ffffff",
                        "background": "#fff8f3",
                        "on-surface-variant": "#4f453f",
                        "on-primary-fixed-variant": "#5a4132",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#745948",
                        "on-secondary-fixed": "#261a00",
                        "on-tertiary-fixed-variant": "#54442a",
                        "on-primary-container": "#bd9c88",
                        "on-tertiary-fixed": "#251a04",
                        "surface-dim": "#e5d8c9",
                        "tertiary-fixed": "#f7dfbc",
                        "primary-fixed-dim": "#e3bfab",
                        "inverse-on-surface": "#fcefdf",
                        "secondary-container": "#ffdf9f",
                        "error": "#ba1a1a",
                        "surface": "#fff8f3",
                        "tertiary-container": "#45371e",
                        "surface-container": "#f9ecdc",
                        "secondary-fixed-dim": "#e1c386",
                        "on-secondary-container": "#78612e",
                        "outline": "#81756e",
                        "secondary": "#725b29",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#fff2e1",
                        "surface-bright": "#fff8f3",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#e3bfab",
                        "on-surface": "#211b11",
                        "inverse-surface": "#362f25",
                        "primary-fixed": "#ffdcc7",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#dac3a1",
                        "primary": "#331f11",
                        "outline-variant": "#d3c3bb",
                        "on-tertiary-container": "#b5a080",
                        "on-primary-fixed": "#2a170a",
                        "tertiary": "#2e220b",
                        "primary-container": "#4b3425",
                        "on-background": "#211b11",
                        "surface-container-high": "#f3e6d6",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#ede1d1",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#ede1d1"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "headline-lg": ["Playfair Display"],
                        "body-md": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(114, 91, 41, 0.1);
            border-right: 1px solid rgba(114, 91, 41, 0.1);
            box-shadow: 0 30px 60px -15px rgba(114, 91, 41, 0.08)
        }
        .bg-image-blur {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCk5SuyuA-w_lvNoLeUzNKDvu2zq9BGHeaR0kk4K0WKwvIil0QD7jkCDas0f-tC6knCuUvRXyHqt7H-A9CZmXpLZta2-EMnN2tw6PhNnjzr4uLq8EQa6W1jWUoL5uJaulGyGvMundgucqTadBYWm_4NyzSaGvmWFro2BnRVQcT2j2QM49RaxhnLlkpBOlg3nU7FQNXBmHbvlu7X_7-mSVSLgDdPQXClpBeUYRDIg_BSLDIV-_m2QIbsL2ECAg87VF-scw-Cnrvm);
            background-size: cover;
            background-position: center;
            filter: blur(8px) opacity(0.4);
            position: absolute;
            inset: 0;
            z-index: -1
        }
        .input-line {
            border-bottom: 1px solid var(--tw-colors-outline-variant);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1)
        }
        .input-line:focus-within {
            border-bottom-color: var(--tw-colors-primary);
            background: rgba(255, 255, 255, 0.1)
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen relative flex items-center justify-center p-4">
    <div class="bg-image-blur"></div>

    <main class="w-full max-w-md relative z-10">
        <!-- Brand Header -->
        <div class="text-center mb-12">
            <h1 class="font-headline-lg text-4xl text-primary mb-2">BakeNest</h1>
            <p class="font-body-md text-on-surface-variant">Artisanal Patisserie</p>
        </div>

        <div class="glass-card rounded-xl p-8 w-full transition-transform duration-500 ease-[cubic-bezier(0.2,0,0,1)] hover:scale-[1.01]">
            <!-- Error/Success Message Area -->
            <div id="message-area" class="hidden mb-4 p-3 rounded text-sm text-center"></div>

            <!-- Tabs -->
            <div class="flex border-b border-outline-variant/30 mb-8">
                <button id="tab-login" class="flex-1 pb-4 uppercase tracking-widest text-primary border-b-2 border-primary transition-colors text-sm font-semibold">
                    Sign In
                </button>
                <button id="tab-register" class="flex-1 pb-4 uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors text-sm font-semibold">
                    Create Account
                </button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="space-y-8">
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Email Address</label>
                    <input id="login-email" required class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Email Address" type="email"/>
                </div>
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Password</label>
                    <input id="login-password" required class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Password" type="password"/>
                </div>
                
                <button class="w-full bg-primary text-on-primary py-4 rounded-[32px] uppercase tracking-widest hover:bg-secondary transition-colors duration-300 shadow-sm text-sm font-semibold" type="submit">
                    Sign In
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="space-y-6 hidden">
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Full Name</label>
                    <input id="reg-name" required class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Full Name" type="text"/>
                </div>
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Email Address</label>
                    <input id="reg-email" required class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Email Address" type="email"/>
                </div>
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Password (min 6 chars)</label>
                    <input id="reg-password" required minlength="6" class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Password" type="password"/>
                </div>
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Phone Number</label>
                    <input id="reg-phone" class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Phone Number" type="text"/>
                </div>
                <div class="relative pt-6 input-line group">
                    <label class="absolute top-0 left-0 text-xs text-on-surface-variant transition-all duration-300 group-focus-within:text-primary">Delivery Address</label>
                    <input id="reg-address" class="w-full bg-transparent border-none p-0 pb-2 text-on-surface focus:ring-0 placeholder-transparent" placeholder="Address" type="text"/>
                </div>

                <button class="w-full bg-primary text-on-primary py-4 rounded-[32px] uppercase tracking-widest hover:bg-secondary transition-colors duration-300 shadow-sm text-sm font-semibold mt-4" type="submit">
                    Create Account
                </button>
            </form>
        </div>
    </main>

    <script>
        // Tab logic
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const msgArea = document.getElementById('message-area');

        function showMessage(msg, isError = false) {
            msgArea.textContent = msg;
            msgArea.className = `mb-4 p-3 rounded text-sm text-center ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            msgArea.classList.remove('hidden');
        }

        tabLogin.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            tabLogin.classList.add('text-primary', 'border-b-2', 'border-primary');
            tabLogin.classList.remove('text-on-surface-variant');
            tabRegister.classList.remove('text-primary', 'border-b-2', 'border-primary');
            tabRegister.classList.add('text-on-surface-variant');
            msgArea.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            tabRegister.classList.add('text-primary', 'border-b-2', 'border-primary');
            tabRegister.classList.remove('text-on-surface-variant');
            tabLogin.classList.remove('text-primary', 'border-b-2', 'border-primary');
            tabLogin.classList.add('text-on-surface-variant');
            msgArea.classList.add('hidden');
        });

        // API Logic
        const API_BASE = '/api/v1/auth';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.accessToken);
                    showMessage('Login successful! Checking permissions...', false);
                    
                    // Fetch user role to determine redirect
                    try {
                        const userRes = await fetch('/api/v1/auth/me', {
                            headers: { 'Authorization': `Bearer ${data.accessToken}` }
                        });
                        const userData = await userRes.json();
                        
                        setTimeout(() => {
                            if (userData.role === 'USER') {
                                window.location.href = '/index.html';
                            } else {
                                window.location.href = '/admin.html';
                            }
                        }, 1000);
                    } catch (roleErr) {
                        setTimeout(() => window.location.href = '/index.html', 1000);
                    }
                } else {
                    showMessage(data.message || 'Invalid credentials.', true);
                }
            } catch (err) {
                showMessage('Server error. Please try again.', true);
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value
            };

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    showMessage('Registration successful! Please sign in.', false);
                    registerForm.reset();
                    setTimeout(() => tabLogin.click(), 2000);
                } else {
                    const errorData = await response.json();
                    showMessage(errorData.message || 'Registration failed.', true);
                }
            } catch (err) {
                showMessage('Server error. Please try again.', true);
            }
        });
    </script>
</body>
</html>
